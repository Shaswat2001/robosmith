<svg width="760" height="190" viewBox="0 0 760 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RoboSmith logo">
  <style>
    .tile { fill: #f8fafc; }
    .bot { fill: #0d9488; }
    .word { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 62px; font-weight: 780; letter-spacing: -1px; }
    .tag { fill: #64748b; font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace; font-size: 16px; font-weight: 500; letter-spacing: 1.4px; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #07111f; }
      .bot { fill: #2dd4bf; }
      .word { fill: #f8fafc; }
      .tag { fill: #94a3b8; }
    }
  </style>

  <g transform="translate(52 21)">
