    <rect class="bot" x="38" y="46" width="72" height="58" rx="14"/>
    <circle fill="none" stroke="#fff" stroke-width="5" cx="62" cy="72" r="10"/>
    <circle fill="none" stroke="#fff" stroke-width="5" cx="86" cy="72" r="10"/>
    <rect class="bot" x="44" y="116" width="60" height="32" rx="8"/>
    <rect fill="none" stroke="#fff" stroke-width="3" x="56" y="124" width="36" height="6" rx="3"/>
    <rect fill="none" stroke="#fff" stroke-width="3" x="56" y="136" width="24" height="6" rx="3"/>
  </g>

  <text class="word" x="244" y="92">RoboSmith</text>
  <text class="tag" x="249" y="128">NATURAL LANGUAGE TO TRAINED ROBOT POLICY</text>
</svg>
