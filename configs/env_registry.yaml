# Embodied Agent Forge — Environment Registry
# =============================================

environments:

  # Gymnasium Classic Control
  - id: gym-cartpole
    name: CartPole
    framework: gymnasium
    env_id: CartPole-v1
    robot_type: custom
    robot_model: cartpole
    env_type: floor
    task_tags: [balance, classic, simple]
    obs_type: state
    action_type: discrete
    description: Balance a pole on a cart by moving left/right.
    source: gymnasium

  - id: gym-pendulum
    name: Pendulum
    framework: gymnasium
    env_id: Pendulum-v1
    robot_type: custom
    robot_model: pendulum
    env_type: floor
    task_tags: [swing-up, classic, continuous]
    obs_type: state
    action_type: continuous
    description: Swing up and balance an inverted pendulum.
    source: gymnasium

  # MuJoCo Locomotion
  - id: mujoco-ant
    name: Ant
    framework: gymnasium
    env_id: Ant-v5
    robot_type: quadruped
    robot_model: ant
    env_type: floor
    task_tags: [locomotion, walk, run, quadruped]
    obs_type: state
    action_type: continuous
    description: A four-legged ant robot that learns to walk forward.
    source: gymnasium[mujoco]

  - id: mujoco-humanoid
    name: Humanoid
    framework: gymnasium
    env_id: Humanoid-v5
    robot_type: biped
    robot_model: humanoid
    env_type: floor
    task_tags: [locomotion, walk, biped, balance]
    obs_type: state
    action_type: continuous
    description: A bipedal humanoid that learns to walk without falling.
    source: gymnasium[mujoco]

