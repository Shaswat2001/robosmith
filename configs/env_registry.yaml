# RoboSmith — Environment Registry
# =================================

environments:

  # ─── Gymnasium Classic Control ───────────────────────────────

  - id: gym-cartpole
    name: CartPole
    framework: gymnasium
    env_id: CartPole-v1
    robot_type: custom
    robot_model: cartpole
    env_type: floor
    task_tags: [balance, classic, simple, pole, cart]
    obs_type: state
    action_type: discrete
    description: Balance a pole on a cart by moving left/right.
    source: gymnasium

  - id: gym-pendulum
    name: Pendulum
